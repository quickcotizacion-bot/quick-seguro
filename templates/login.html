<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Seguro — Ingresar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #6B3FA0 0%, #C054A0 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  .logo { font-size: 28px; font-weight: 800; color: #6B3FA0; margin-bottom: 6px; }
  .subtitle { color: #9B7EC8; font-size: 14px; margin-bottom: 32px; }
  label { display: block; text-align: left; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600; }
  input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e5e0f0;
    border-radius: 8px;
    font-size: 15px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #6B3FA0; }
  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6B3FA0, #C054A0);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  .error {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    color: #dc2626;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 20px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🛡 Quick Seguro</div>
  <div class="subtitle">Generador de cotizaciones</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Usuario</label>
    <input type="text" name="usuario" autocomplete="username" autofocus required>
    <label>Contraseña</label>
    <input type="password" name="password" autocomplete="current-password" required>
    <button type="submit">Ingresar</button>
  </form>
</div>
</body>
</html>
